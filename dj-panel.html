<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ CONTROL CENTER | PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background: #020617; }
        .dj-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-glow { box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); }
    </style>
</head>
<body class="text-slate-200 min-h-screen">

    <header class="glass sticky top-0 z-40 px-6 py-4 border-b border-amber-500/20">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-amber-400 to-orange-600 rounded-xl flex items-center justify-center text-slate-950 shadow-[0_0_20px_rgba(245,158,11,0.5)]">
                    <i class="fa-solid fa-sliders text-2xl"></i>
                </div>
                <div>
                    <h1 class="dj-font text-lg md:text-xl text-amber-400 tracking-tighter">DJ CONTROL CENTER</h1>
                    <p class="text-[10px] text-slate-500 tracking-[0.2em] uppercase">Realtime Engine System</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:py-8 space-y-8">
        <section class="glass rounded-3xl p-6 neon-glow border-l-4 border-amber-500">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                <div>
                    <label class="block text-[10px] uppercase font-black text-amber-500 mb-2 tracking-widest">Start Time</label>
                    <input type="time" id="configStartTime" onchange="updateSystemSettingsOnCloud()" class="w-full bg-slate-950 border border-slate-700 text-white rounded-xl p-3 focus:border-amber-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-[10px] uppercase font-black text-amber-500 mb-2 tracking-widest">End Time</label>
                    <input type="time" id="configEndTime" onchange="updateSystemSettingsOnCloud()" class="w-full bg-slate-950 border border-slate-700 text-white rounded-xl p-3 focus:border-amber-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-[10px] uppercase font-black text-amber-500 mb-2 tracking-widest">System Status</label>
                    <button id="configToggleBtn" onclick="toggleSystemActiveOnCloud()" class="w-full font-bold text-xs py-3.5 rounded-xl transition-all hover:brightness-110 active:scale-95 border border-amber-500/50">
                        Initializing...
                    </button>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="glass rounded-3xl p-6">
                    <h2 class="dj-font text-sm text-amber-400 mb-4 uppercase tracking-widest">Now Playing</h2>
                    <div id="videoPlayerContainer" class="aspect-video rounded-2xl overflow-hidden border border-slate-800 bg-black relative">
                        <div id="youtubePlayer" class="w-full h-full flex items-center justify-center text-slate-600 text-xs">ระบบรอรับเพลง...</div>
                    </div>
                    <div id="playingTitle" class="mt-4 text-sm font-bold text-slate-100 truncate">ยังไม่ได้เลือกเพลง</div>
                </div>
            </div>

            <div class="glass rounded-3xl p-6 h-fit space-y-6 border border-slate-800">
                <label class="block text-[10px] uppercase font-black text-slate-500 mb-3 tracking-widest">Table Filter</label>
                <select id="adminTableFilter" onchange="handleTableFilterChange()" class="w-full bg-slate-950 border border-slate-700 text-white p-4 rounded-xl cursor-pointer hover:border-amber-500 transition-all">
                    <option value="all">แสดงคิวเพลงจาก "ทุกโต๊ะ"</option>
                </select>
                <button onclick="clearAllQueue()" class="w-full bg-rose-500/10 border border-rose-500/20 text-rose-400 hover:bg-rose-500 hover:text-white text-xs font-bold py-4 rounded-xl transition-all">💥 ล้างคิวทั้งหมด</button>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex bg-slate-900 p-2 rounded-2xl border border-slate-800 gap-2">
                <button id="tabBtn-pending" onclick="switchQueueTab('pending')" class="flex-1 py-3 text-xs font-bold rounded-xl transition-all text-amber-400">📥 รอ <span id="count-pending">0</span></button>
                <button id="tabBtn-playing" onclick="switchQueueTab('playing')" class="flex-1 py-3 text-xs font-bold rounded-xl transition-all text-slate-400">🔴 เล่น <span id="count-playing">0</span></button>
                <button id="tabBtn-completed" onclick="switchQueueTab('completed')" class="flex-1 py-3 text-xs font-bold rounded-xl transition-all text-slate-400">✅ จบ <span id="count-completed">0</span></button>
            </div>
            <div id="queueList" class="space-y-3"></div>
        </div>
    </main>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = { apiKey: "AIzaSyC9TWZbygXniEE2gE0SU08mFnaeCH2wlz8", authDomain: "my-shop-music.firebaseapp.com", databaseURL: "https://my-shop-music-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "my-shop-music", appId: "1:113291989652:web:cc529e1558f661e29f5a81" };
        const db = getDatabase(initializeApp(firebaseConfig));
        
        let cloudSystemSettings = { isActive: true };

        onValue(ref(db, 'system_settings'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                cloudSystemSettings = data;
                document.getElementById('configStartTime').value = data.startTime || "17:00";
                document.getElementById('configEndTime').value = data.endTime || "00:00";
                const btn = document.getElementById('configToggleBtn');
                btn.innerHTML = data.isActive ? "🟢 ระบบออนไลน์ (คลิกปิด)" : "🔴 ระบบออฟไลน์ (คลิกเปิด)";
                btn.className = `w-full font-bold text-xs py-3.5 rounded-xl transition-all ${data.isActive ? 'bg-emerald-500/20 text-emerald-400 border-emerald-500/50' : 'bg-rose-500/20 text-rose-400 border-rose-500/50'}`;
            }
        });

        window.toggleSystemActiveOnCloud = () => update(ref(db, 'system_settings'), { isActive: !cloudSystemSettings.isActive });
        window.updateSystemSettingsOnCloud = () => update(ref(db, 'system_settings'), { startTime: document.getElementById('configStartTime').value, endTime: document.getElementById('configEndTime').value });
        // ... (สามารถวางฟังก์ชันจัดการคิวเพลงที่เหลือของคุณต่อที่นี่ได้เลยครับ)
    </script>
</body>
</html>
