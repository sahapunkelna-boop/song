<script src="https://www.youtube.com/iframe_api"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 🔗 บัญชี Firebase ของโปรเจกต์คุณ
        const firebaseConfig = {
            apiKey: "AIzaSyC9TWZbygXniEE2gE0SU08mFnaeCH2wlz8",
            authDomain: "my-shop-music.firebaseapp.com",
            databaseURL: "https://my-shop-music-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-shop-music",
            storageBucket: "my-shop-music.firebasestorage.app",
            messagingSenderId: "113291989652",
            appId: "1:113291989652:web:cc529e1558f661e29f5a81",
            measurementId: "G-SM2FQCB6YS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const songsRef = ref(db, 'songs');

        const YT_API_KEY = 'AIzaSyComYbMyJPLjnQEErW_V7q4xpYZcNkIfdk'; 
        const DJ_PASSWORD = '1'; 
        
        let currentRole = 'customer';
        let currentTab = 'pending'; 
        let selectedTableFilter = 'all'; // สำหรับดีเจ
        let selectedCustomerTable = 'none'; // สำหรับลูกค้าใช้ดูคิวตัวเอง
        let songQueue = []; 
        let player = null; 
        let currentlyPlayingId = null; 

        window.onload = function() {
            const tableSelect = document.getElementById('tableNo');
            const adminFilterSelect = document.getElementById('adminTableFilter');
            const customerFilterSelect = document.getElementById('customerTableFilter');

            // วนลูปสร้างตัวเลือกโต๊ะ 1-30 ในจุดต่างๆ
            for (let i = 1; i <= 30; i++) {
                let optCustomer = document.createElement('option');
                optCustomer.value = i;
                optCustomer.innerHTML = `โต๊ะที่ ${i}`;
                tableSelect.appendChild(optCustomer);

                let optAdmin = document.createElement('option');
                optAdmin.value = i;
                optAdmin.innerHTML = `แสดงเฉพาะคิว "โต๊ะที่ ${i}"`;
                adminFilterSelect.appendChild(optAdmin);

                let optCustFilter = document.createElement('option');
                optCustFilter.value = i;
                optCustFilter.innerHTML = `โต๊ะที่ ${i}`;
                customerFilterSelect.appendChild(optCustFilter);
            }
            
            const urlParams = new URLSearchParams(window.location.search);
            const tableParam = urlParams.get('table');
            if(tableParam) {
                tableSelect.value = tableParam;
                customerFilterSelect.value = tableParam;
                selectedCustomerTable = tableParam;
            }

            document.getElementById('djPasswordInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') verifyDjPassword();
            });
        }

        // ดึงข้อมูลแบบ Real-time
        onValue(songsRef, (snapshot) => {
            const data = snapshot.val();
            songQueue = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    songQueue.push({ id: key, ...data[key] });
                });
                songQueue.sort((a, b) => (a.order || 0) - (b.order || 0));
            }
            syncCurrentlyPlayingTitle();
            renderQueue();          // เรนเดอร์คิวฝั่งดีเจ
            renderCustomerQueue();  // เรนเดอร์คิวประจำโต๊ะฝั่งลูกค้า
        });

        // เมื่อลูกค้าเปลี่ยนโต๊ะที่ฟอร์มขอเพลง -> ซิงค์ไปตัวกรองดูคิวให้อัตโนมัติ
        window.handleCustomerTableChange = function() {
            const tableVal = document.getElementById('tableNo').value;
            if (tableVal) {
                document.getElementById('customerTableFilter').value = tableVal;
                selectedCustomerTable = tableVal;
                renderCustomerQueue();
            }
        }

        // เมื่อลูกค้าเลือกเปลี่ยนตัวกรองดูคิวเพลงเอง
        window.handleCustomerFilterChange = function() {
            selectedCustomerTable = document.getElementById('customerTableFilter').value;
            renderCustomerQueue();
        }

        // ฟังก์ชันเรนเดอร์คิวเพลงประจำโต๊ะในหน้าของลูกค้า
        function renderCustomerQueue() {
            const container = document.getElementById('customerQueueList');
            if (selectedCustomerTable === 'none' || !selectedCustomerTable) {
                container.innerHTML = `
                    <div class="text-center py-10 text-slate-500 text-xs flex flex-col items-center justify-center gap-2">
                        <i class="fa-solid fa-chair text-3xl text-slate-800"></i>
                        <span>กรุณาเลือกหมายเลขโต๊ะของคุณด้านบน เพื่อตรวจสอบคิวเพลง</span>
                    </div>
                `;
                return;
            }

            // กรองเพลงทั้งหมดที่ผูกกับโต๊ะนี้
            const myTableSongs = songQueue.filter(item => String(item.table) === String(selectedCustomerTable));

            if (myTableSongs.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-10 text-slate-500 text-xs flex flex-col items-center justify-center gap-2">
                        <i class="fa-solid fa-circle-info text-2xl text-slate-700"></i>
                        <span>โต๊ะที่ ${selectedCustomerTable} ยังไม่มีการขอเพลงในคืนนี้</span>
                    </div>
                `;
                return;
            }

            container.innerHTML = ''; // ล้างค่าเก่าออก

            // หาคิวรอเล่นรวมทั้งหมด เพื่อเอาไว้คำนวณว่าเพลงที่รอนั้นเป็น "คิวรวมที่เท่าไหร่" ของร้าน
            const allPendingSongs = songQueue.filter(item => item.status === 'pending');

            myTableSongs.forEach((item) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = "p-3 bg-slate-950 border border-slate-800/60 rounded-xl flex items-center justify-between gap-3 shadow-sm";
                
                let statusBadge = '';
                if (item.status === 'pending') {
                    const overallQueueNo = allPendingSongs.findIndex(s => s.id === item.id) + 1;
                    statusBadge = `<span class="bg-amber-500/10 text-amber-400 border border-amber-500/20 text-[10px] px-2 py-0.5 rounded-full shrink-0 font-medium font-mono">⏳ รอเล่น (คิวร้าน #${overallQueueNo})</span>`;
                } else if (item.status === 'playing') {
                    statusBadge = `<span class="bg-rose-500/20 text-rose-400 border border-rose-500/30 text-[10px] px-2 py-0.5 rounded-full shrink-0 font-bold animate-pulse">🔴 กำลังเล่นอยู่</span>`;
                } else if (item.status === 'completed') {
                    statusBadge = `<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 text-[10px] px-2 py-0.5 rounded-full shrink-0 font-medium">✅ เปิดเรียบร้อย</span>`;
                }

                itemDiv.innerHTML = `
                    <div class="min-w-0 flex-1">
                        <p class="text-xs md:text-sm font-medium text-slate-200 truncate">${item.song}</p>
                        <p class="text-[10px] text-slate-500 mt-0.5 font-light"><i class="fa-solid fa-clock mr-1"></i>ขอตอน ${item.time} น.</p>
                    </div>
                    ${statusBadge}
                `;
                container.appendChild(itemDiv);
            });
        }

        // ดีเจสลับเปลี่ยนตัวกรองโต๊ะ
        window.handleTableFilterChange = function() {
            selectedTableFilter = document.getElementById('adminTableFilter').value;
            renderQueue(); 
        }

        window.searchSongList = function() {
            const query = document.getElementById('songName').value.trim();
            const songListContainer = document.getElementById('youtubeSongsList');
            
            if (!query) {
                alert('กรุณาพิมพ์ชื่อเพลง หรือชื่อนักร้องก่อนกดค้นหาครับ');
                return;
            }

            const ytId = extractYouTubeId(query);
            if (ytId) {
                const directUrl = `https://www.youtube.com/watch?v=${ytId}`;
                document.getElementById('selectedVideoUrl').value = directUrl;
                songListContainer.innerHTML = `
                    <div class="p-4 text-center bg-emerald-950/40 border border-emerald-500/20 text-emerald-400 rounded-xl text-sm flex items-center justify-center gap-2">
                        <i class="fa-solid fa-circle-check text-base"></i> ตรวจพบลิงก์วิดีโอตรงแล้ว! สามารถกดส่งเพลงได้ทันที
                    </div>
                `;
                songListContainer.classList.remove('hidden');
                return;
            }

            songListContainer.innerHTML = `<div class="p-4 text-center text-sm text-slate-500"><i class="fa-solid fa-spinner animate-spin mr-2 text-rose-500"></i>กำลังค้นหาจาก YouTube...</div>`;
            songListContainer.classList.remove('hidden');

            const searchApiUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(query)}&type=video&key=${YT_API_KEY}`;

            fetch(searchApiUrl)
                .then(response => response.json())
                .then(data => {
                    const items = data.items;
                    if (!items || items.length === 0) {
                        songListContainer.innerHTML = `<div class="p-4 text-center text-sm text-slate-500">ไม่พบข้อมูลเพลงนี้บนระบบ YouTube</div>`;
                        return;
                    }

                    const videoIds = items.map(item => item.id.videoId).join(',');
                    const detailsApiUrl = `https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${videoIds}&key=${YT_API_KEY}`;

                    return fetch(detailsApiUrl)
                        .then(res => res.json())
                        .then(detailsData => {
                            songListContainer.innerHTML = '';
                            items.forEach((item) => {
                                const songTitle = item.snippet.title;        
                                const artistName = item.snippet.channelTitle;  
                                const videoId = item.id.videoId;
                                const thumbnailUrl = item.snippet.thumbnails.default.url; 
                                const directUrl = `https://www.youtube.com/watch?v=${videoId}`;
                                
                                const matchedDetail = detailsData.items.find(d => d.id === videoId);
                                const rawDuration = matchedDetail ? matchedDetail.contentDetails.duration : '';
                                const formattedDuration = formatISO8601Duration(rawDuration);

                                const div = document.createElement('div');
                                div.className = "p-3 flex items-center justify-between gap-3 hover:bg-slate-800/60 transition-all cursor-pointer group";
                                div.onclick = () => selectThisSong(songTitle, directUrl);
                                
                                div.innerHTML = `
                                    <div class="flex items-center gap-3 flex-1 min-w-0">
                                        <img src="${thumbnailUrl}" class="w-16 h-11 object-cover rounded-lg border border-slate-800 shrink-0 shadow-md group-hover:border-rose-500/50 transition-colors" alt="Cover">
                                        <div class="min-w-0 flex-1">
                                            <p class="text-sm font-semibold text-slate-200 group-hover:text-emerald-400 transition-colors truncate">
                                                <span class="text-[10px] text-emerald-400 font-light border border-emerald-500/30 rounded px-1 py-0.2 mr-1">เพลง</span>${songTitle}
                                            </p>
                                            <div class="flex items-center gap-3 mt-1 text-xs text-slate-400 font-light">
                                                <span class="truncate flex items-center gap-1">
                                                    <i class="fa-solid fa-user text-[10px] text-rose-400"></i> ช่อง: <span class="text-slate-200 font-medium">${artistName}</span>
                                                </span>
                                                <span class="text-amber-400 bg-amber-500/10 border border-amber-500/20 px-1.5 py-0.2 rounded font-mono font-medium shrink-0 flex items-center gap-1">
                                                    <i class="fa-solid fa-stopwatch text-[10px]"></i> ${formattedDuration}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                    <button type="button" class="bg-slate-800 group-hover:bg-rose-600 group-hover:text-white border border-slate-700 group-hover:border-rose-500 text-slate-300 text-[11px] font-medium py-1.5 px-2.5 rounded-lg transition-all shrink-0">
                                        เลือกเพลงนี้
                                    </button>
                                `;
                                songListContainer.appendChild(div);
                            });
                        });
                })
                .catch(error => {
                    console.error(error);
                    songListContainer.innerHTML = `<div class="p-4 text-center text-sm text-rose-400">เกิดข้อผิดพลาดในการดึงข้อมูล</div>`;
                });
        }

        function extractYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // แปลงเวลา ISO 8601 (PT4M33S) เป็นรูปแบบอ่านง่าย 04:33
        function formatISO8601Duration(duration) {
            if(!duration) return "00:00";
            const match = duration.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
            if(!match) return "00:00";
            const hours = (match[1] ? match[1] : 0);
            const minutes = (match[2] ? match[2] : 0);
            const seconds = (match[3] ? match[3] : 0);
            
            let result = "";
            if(parseInt(hours) > 0) {
                result += String(hours).padStart(2, '0') + ":";
            }
            result += String(minutes).padStart(2, '0') + ":" + String(seconds).padStart(2, '0');
            return result;
        }

        // เลือกเพลงจาก Dropdown ค้นหา
        function selectThisSong(title, url) {
            document.getElementById('songName').value = title;
            document.getElementById('selectedVideoUrl').value = url;
            document.getElementById('youtubeSongsList').classList.add('hidden');
        }

        // ลูกค้ากดส่งคำขอเพลง
        window.submitSong = function(event) {
            event.preventDefault();
            const tableNo = document.getElementById('tableNo').value;
            const songName = document.getElementById('songName').value.trim();
            let videoUrl = document.getElementById('selectedVideoUrl').value;

            if(!tableNo || !songName) return;

            // หากไม่มีการกดค้นหาและเลือกจากรายการ ให้มองหา ID เผื่อลูกค้านำลิงก์มาวางตรงๆ
            if(!videoUrl) {
                const ytId = extractYouTubeId(songName);
                if(ytId) {
                    videoUrl = `https://www.youtube.com/watch?v=${ytId}`;
                } else {
                    alert('กรุณากดค้นหาเพลงบน YouTube และคลิกเลือกเพลงจากรายการก่อนครับ');
                    return;
                }
            }

            const now = new Date();
            const timeStr = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
            const timestamp = now.getTime();

            const newSong = {
                table: tableNo,
                song: songName,
                url: videoUrl,
                status: 'pending',
                time: timeStr,
                order: timestamp
            };

            push(songsRef, newSong)
                .then(() => {
                    showStatusAlert('ส่งคำขอเพลงเรียบร้อยแล้ว! กรุณารอดีเจเปิดคิวของคุณนะครับ', 'success');
                    document.getElementById('requestForm').reset();
                    document.getElementById('selectedVideoUrl').value = '';
                })
                .catch((err) => {
                    console.error(err);
                    showStatusAlert('เกิดข้อผิดพลาดในการส่งข้อมูล กรุณาลองใหม่อีกครั้ง', 'error');
                });
        }

        function showStatusAlert(msg, type) {
            const alertBox = document.getElementById('statusAlert');
            alertBox.innerHTML = msg;
            alertBox.className = `p-4 rounded-xl font-medium text-center text-sm transition-all duration-300 block ${
                type === 'success' ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-rose-500/10 text-rose-400 border border-rose-500/20'
            }`;
            setTimeout(() => { alertBox.className = "hidden"; }, 4000);
        }

        // สลับ Role ระหว่าง ลูกค้า และ ดีเจ
        window.handleRoleToggle = function() {
            if (currentRole === 'customer') {
                document.getElementById('passwordModal').classList.remove('hidden');
                document.getElementById('djPasswordInput').focus();
            } else {
                currentRole = 'customer';
                document.getElementById('customerView').classList.remove('hidden');
                document.getElementById('adminView').classList.add('hidden');
                document.getElementById('roleBtn').innerHTML = `<i class="fa-solid fa-user-gear"></i> <span>สลับไปหน้า "ดีเจ"</span>`;
                document.getElementById('roleBtn').className = "bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-2 px-5 rounded-full text-sm transition-all duration-300 shadow-lg shadow-emerald-500/20 active:scale-95 cursor-pointer flex items-center gap-2";
            }
        }

        window.closePasswordModal = function() {
            document.getElementById('passwordModal').classList.add('hidden');
            document.getElementById('djPasswordInput').value = '';
        }

        window.verifyDjPassword = function() {
            const pass = document.getElementById('djPasswordInput').value;
            if (pass === DJ_PASSWORD) {
                currentRole = 'admin';
                document.getElementById('passwordModal').classList.add('hidden');
                document.getElementById('djPasswordInput').value = '';
                document.getElementById('customerView').classList.add('hidden');
                document.getElementById('adminView').classList.remove('hidden');
                document.getElementById('roleBtn').innerHTML = `<i class="fa-solid fa-house-user"></i> <span>กลับไปหน้าขอเพลง (ลูกค้า)</span>`;
                document.getElementById('roleBtn').className = "bg-amber-500 hover:bg-amber-600 text-white font-medium py-2 px-5 rounded-full text-sm transition-all duration-300 shadow-lg shadow-amber-500/20 active:scale-95 cursor-pointer flex items-center gap-2";
                renderQueue();
            } else {
                alert('รหัสผ่านดีเจไม่ถูกต้อง!');
            }
        }

        // ดีเจเปลี่ยนแท็บคิวเพลง (ยังไม่ได้เล่น | กำลังเล่น | เล่นเสร็จแล้ว)
        window.switchQueueTab = function(tab) {
            currentTab = ['pending', 'playing', 'completed'].includes(tab) ? tab : 'pending';
            ['pending', 'playing', 'completed'].forEach(t => {
                const btn = document.getElementById(`tabBtn-${t}`);
                if (t === currentTab) {
                    btn.className = `py-2 text-xs font-semibold rounded-lg transition-all cursor-pointer flex flex-col items-center gap-0.5 ${
                        t === 'pending' ? 'text-amber-400 bg-slate-900 border border-slate-800' :
                        t === 'playing' ? 'text-rose-400 bg-slate-900 border border-slate-800' : 'text-emerald-400 bg-slate-900 border border-slate-800'
                    }`;
                } else {
                    btn.className = "py-2 text-xs font-semibold rounded-lg transition-all cursor-pointer flex flex-col items-center gap-0.5 text-slate-400 hover:text-slate-200";
                }
            });
            renderQueue();
        }

        // เรนเดอร์รายการคิวเพลงฝั่งดีเจ
        function renderQueue() {
            const container = document.getElementById('queueList');
            
            // นับจำนวนคิวแต่ละแท็บ
            const counts = { pending: 0, playing: 0, completed: 0 };
            songQueue.forEach(item => {
                if(counts[item.status] !== undefined) counts[item.status]++;
            });
            document.getElementById('count-pending').innerHTML = counts.pending;
            document.getElementById('count-playing').innerHTML = counts.playing;
            document.getElementById('count-completed').innerHTML = counts.completed;

            // กรองข้อมูลตามสถานะแท็บ และ ตัวกรองหมายเลขโต๊ะ
            let filtered = songQueue.filter(item => item.status === currentTab);
            if (selectedTableFilter !== 'all') {
                filtered = filtered.filter(item => String(item.table) === String(selectedTableFilter));
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div id="emptyState" class="text-center py-16 bg-slate-900/40 rounded-2xl border border-dashed border-slate-800 flex flex-col items-center justify-center">
                        <i class="fa-solid fa-compact-disc text-4xl text-slate-700 mb-3"></i>
                        <p class="text-slate-500 text-xs">ไม่มีคิวเพลงในหมวดหมู่นี้...</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            filtered.forEach((item) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = "p-3.5 bg-slate-900 border border-slate-800 rounded-xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 shadow-md";
                
                let actionButtons = '';
                if (item.status === 'pending') {
                    actionButtons = `
                        <div class="flex items-center gap-1.5 w-full sm:w-auto">
                            <button onclick="playSong('${item.id}', '${item.url}')" class="flex-1 sm:flex-none bg-emerald-500 hover:bg-emerald-600 text-white text-[11px] font-medium py-1.5 px-3 rounded-lg transition-all cursor-pointer shadow-md flex items-center justify-center gap-1">
                                <i class="fa-solid fa-play"></i> เล่นในเว็บ
                            </button>
                            <button onclick="updateStatus('${item.id}', 'completed')" class="flex-1 sm:flex-none bg-slate-800 hover:bg-slate-700 text-slate-300 text-[11px] font-medium py-1.5 px-3 rounded-lg transition-all border border-slate-700 cursor-pointer flex items-center justify-center gap-1">
                                <i class="fa-solid fa-check"></i> เสร็จสิ้น
                            </button>
                            <button onclick="deleteSong('${item.id}')" class="bg-rose-500/10 hover:bg-rose-600 text-rose-400 hover:text-white text-[11px] py-1.5 px-2 rounded-lg transition-all cursor-pointer flex items-center justify-center">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    `;
                } else if (item.status === 'playing') {
                    actionButtons = `
                        <div class="flex items-center gap-1.5 w-full sm:w-auto">
                            <button onclick="updateStatus('${item.id}', 'completed')" class="flex-1 sm:flex-none bg-emerald-500 hover:bg-emerald-600 text-white text-[11px] font-medium py-1.5 px-3 rounded-lg transition-all cursor-pointer shadow-md flex items-center justify-center gap-1">
                                <i class="fa-solid fa-circle-check"></i> เล่นเสร็จแล้ว
                            </button>
                            <button onclick="updateStatus('${item.id}', 'pending')" class="flex-1 sm:flex-none bg-slate-800 hover:bg-slate-700 text-slate-300 text-[11px] font-medium py-1.5 px-3 rounded-lg transition-all border border-slate-700 cursor-pointer flex items-center justify-center gap-1">
                                <i class="fa-solid fa-rotate-left"></i> กลับไปรอ
                            </button>
                        </div>
                    `;
                } else if (item.status === 'completed') {
                    actionButtons = `
                        <div class="flex items-center gap-1.5 w-full sm:w-auto">
                            <button onclick="updateStatus('${item.id}', 'pending')" class="flex-1 sm:flex-none bg-amber-500/10 hover:bg-amber-500 text-amber-400 hover:text-white border border-amber-500/20 text-[11px] font-medium py-1.5 px-3 rounded-lg transition-all cursor-pointer flex items-center justify-center gap-1">
                                <i class="fa-solid fa-layer-group"></i> ดึงกลับมารอใหม่
                            </button>
                            <button onclick="deleteSong('${item.id}')" class="bg-rose-500/10 hover:bg-rose-600 text-rose-400 hover:text-white text-[11px] py-1.5 px-2 rounded-lg transition-all cursor-pointer flex items-center justify-center">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    `;
                }

                itemDiv.innerHTML = `
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-2">
                            <span class="bg-slate-950 border border-slate-800 text-amber-400 text-[11px] font-semibold px-2 py-0.5 rounded-md shrink-0">โต๊ะ ${item.table}</span>
                            <span class="text-[10px] text-slate-500 font-mono"><i class="fa-solid fa-clock"></i> ${item.time}</span>
                        </div>
                        <p class="text-sm font-medium text-slate-200 mt-1.5 truncate" title="${item.song}">${item.song}</p>
                    </div>
                    ${actionButtons}
                `;
                container.appendChild(itemDiv);
            });
        }

        // อัปเดตสถานะเพลง (pending, playing, completed)
        window.updateStatus = function(id, newStatus) {
            const itemRef = ref(db, `songs/${id}`);
            update(itemRef, { status: newStatus })
                .then(() => {
                    if (newStatus === 'playing') {
                        currentlyPlayingId = id;
                    } else if (currentlyPlayingId === id && newStatus !== 'playing') {
                        currentlyPlayingId = null;
                    }
                });
        }

        // ลบคิวเพลงเดี่ยว
        window.deleteSong = function(id) {
            if (confirm('คุณแน่ใจหรือไม่ว่าต้องการลบคิวเพลงนี้?')) {
                const itemRef = ref(db, `songs/${id}`);
                remove(itemRef).then(() => {
                    if (currentlyPlayingId === id) currentlyPlayingId = null;
                });
            }
        }

        // ล้างคิวเพลงทั้งหมดในระบบ
        window.clearAllQueue = function() {
            if (confirm('🚨 คำเตือน: คุณต้องการล้างข้อมูลคิวเพลงทั้งหมดในร้านออกใช่หรือไม่? ข้อมูลจะถูกลบถาวร')) {
                set(songsRef, null).then(() => {
                    currentlyPlayingId = null;
                    closeVideoPlayer();
                });
            }
        }

        // เครื่องเล่นวิดีโอ (YouTube Iframe Player API)
        window.playSong = function(id, url) {
            const videoId = extractYouTubeId(url);
            if (!videoId) {
                alert('ไม่สามารถถอดรหัส Video ID จากลิงก์นี้ได้');
                return;
            }

            // ซิงค์ปรับสถานะเพลงอื่นที่เคย 'playing' ให้กลับเป็นเสร็จสิ้น หรือตั้งคิวนี้เป็นกำลังเล่น
            songQueue.forEach(s => {
                if (s.status === 'playing' && s.id !== id) {
                    update(ref(db, `songs/${s.id}`), { status: 'completed' });
                }
            });
            update(ref(db, `songs/${id}`), { status: 'playing' });
            currentlyPlayingId = id;

            // บังคับเปลี่ยนแท็บดีเจไปที่แท็บ "กำลังเล่น" เพื่อให้เห็นสถานะสด
            switchQueueTab('playing');

            // ซ่อนกล่องแจ้งเตือน Error เดิม
            document.getElementById('playerFallbackAlert').classList.add('hidden');

            // เริ่มต้นสร้างหรือโหลดวิดีโอเข้า Iframe
            if (player === null) {
                player = new YT.Player('youtubePlayer', {
                    height: '100%',
                    width: '100%',
                    videoId: videoId,
                    playerVars: {
                        'autoplay': 1,
                        'playsinline': 1,
                        'rel': 0
                    },
                    events: {
                        'onReady': onPlayerReady,
                        'onError': onPlayerError,
                        'onStateChange': onPlayerStateChange
                    }
                });
            } else {
                if (typeof player.loadVideoById === 'function') {
                    player.loadVideoById(videoId);
                }
            }
        }

        function onPlayerReady(event) {
            event.target.playVideo();
        }

        // ดักจับสถานะ หากเปิดไม่ได้ (เช่นคลิปโดนบล็อกจากแอปภายนอก / Error 153) ให้เปิดระบบ Fallback ทางเลือก
        function onPlayerError(event) {
            console.log("Player Error Code:", event.data);
            const currentPlayingSong = songQueue.find(s => s.id === currentlyPlayingId);
            if (currentPlayingSong) {
                document.getElementById('fallbackExternalLink').href = currentPlayingSong.url;
                document.getElementById('playerFallbackAlert').classList.remove('hidden');
            }
        }

        // เมื่อเล่นวิดีโอจบ ให้ปรับสถานะเป็น Completed อัตโนมัติ
        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                if (currentlyPlayingId) {
                    window.updateStatus(currentlyPlayingId, 'completed');
                    closeVideoPlayer();
                }
            }
        }

        window.closeVideoPlayer = function() {
            if (player && typeof player.stopVideo === 'function') {
                player.stopVideo();
            }
            document.getElementById('youtubePlayer').innerHTML = `
                <div class="text-center p-4">
                    <i class="fa-brands fa-youtube text-4xl mb-2 text-slate-700"></i>
                    <p>เลือกปุ่ม "เล่นในเว็บ" ด้านขวามือเพื่อเริ่มสตรีม</p>
                </div>
            `;
            player = null;
            document.getElementById('playerFallbackAlert').classList.add('hidden');
            syncCurrentlyPlayingTitle();
        }

        // ฟังก์ชันซิงค์ข้อมูลหัวเรื่องชื่อเพลงที่กำลังเล่นอยู่ไปที่แผ่นป้ายหน้าหลัก (ทั้งฝั่งลูกค้าและดีเจ)
        function syncCurrentlyPlayingTitle() {
            const currentPlaying = songQueue.find(item => item.status === 'playing');
            const customerTitle = document.getElementById('customerPlayingTitle');
            const adminTitle = document.getElementById('playingTitle');
            const vinylIcon = document.getElementById('vinylIcon');

            if (currentPlaying) {
                const displayName = `[โต๊ะ ${currentPlaying.table}] - ${currentPlaying.song}`;
                if(customerTitle) customerTitle.innerHTML = displayName;
                if(adminTitle) adminTitle.innerHTML = displayName;
                if(vinylIcon) vinylIcon.classList.remove('hidden');
            } else {
                const defaultText = "ยังไม่ได้เลือกเพลง / ดีเจกำลังเตรียมเปิดเพลง";
                if(customerTitle) customerTitle.innerHTML = defaultText;
                if(adminTitle) adminTitle.innerHTML = "ยังไม่ได้เลือกเพลง";
                if(vinylIcon) vinylIcon.classList.add('hidden');
            }
        }
    </script>
