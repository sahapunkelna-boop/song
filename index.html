<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบขอเพลงในร้าน - Customer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght=300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen antialiased">

    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-40 px-4 py-3">
        <div class="max-w-6xl mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-rose-500 via-purple-600 to-emerald-500 rounded-2xl flex items-center justify-center text-white shadow-lg">
                    <i class="fa-solid fa-compact-disc text-xl animate-spin" style="animation-duration: 4s;"></i>
                </div>
                <div>
                    <h1 class="font-black text-sm md:text-base bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">ระบบขอเพลงในร้าน</h1>
                    <p class="text-[10px] text-slate-400 tracking-wider font-mono">LIVE CLOUD SYSTEM v3.5</p>
                </div>
            </div>

            <a href="dj-panel.html" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 px-3 py-2 rounded-xl transition-all cursor-pointer">
                <i class="fa-solid fa-gear text-xs"></i>
                <span class="text-[10px] font-bold hidden md:inline">หน้าดีเจ</span>
            </a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:py-8">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-3 flex items-center gap-4 overflow-hidden relative shadow-inner mb-6">
            <div class="flex items-center gap-2 shrink-0 bg-rose-500/10 text-rose-400 font-black text-xs px-3 py-1.5 rounded-xl border border-rose-500/20">
                <i id="vinylIcon" class="fa-solid fa-compact-disc animate-spin text-base hidden"></i>
                <span>กำลังเล่น:</span>
            </div>
            <div class="flex-1 overflow-hidden">
                <p id="customerPlayingTitle" class="text-xs md:text-sm font-semibold text-slate-200 truncate">ยังไม่ได้เลือกเพลง / ดีเจกำลังเตรียมเปิดเพลง</p>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl relative overflow-hidden group mb-6">
            <div class="flex items-center justify-between flex-wrap gap-2 mb-4">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-paper-plane text-emerald-400 text-lg"></i>
                    <h2 class="font-extrabold text-base text-white">ส่งคำขอเพลงของคุณที่นี่ <span class="text-xs font-bold text-rose-400 bg-rose-500/10 border border-rose-500/20 px-2 py-0.5 rounded-md ml-1">จำกัดโต๊ะละ 3 เพลง</span></h2>
                </div>
                <span id="systemTimeBadge" class="text-xs text-amber-400 bg-amber-500/10 border border-amber-500/20 px-2.5 py-1 rounded-xl font-medium">กำลังโหลด...</span>
            </div>

            <form onsubmit="submitSong(event)" class="space-y-4">
                <div class="grid grid-cols-3 gap-3">
                    <div class="col-span-1">
                        <label class="block text-[11px] font-bold text-slate-400 mb-1">หมายเลขโต๊ะ</label>
                        <select id="tableNo" onchange="handleCustomerTableChange()" class="w-full bg-slate-950 border border-slate-800 focus:border-emerald-500 text-slate-100 text-xs font-bold rounded-xl p-3 focus:outline-none cursor-pointer" required>
                            <option value="" disabled selected>เลือกโต๊ะ</option>
                        </select>
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[11px] font-bold text-slate-400 mb-1">ชื่อเพลง, ศิลปิน หรือ ลิงก์ YouTube</label>
                        <div class="flex gap-2">
                            <input type="text" id="songName" placeholder="เช่น ทรงอย่างแบด Paper Planes" class="w-full bg-slate-950 border border-slate-800 focus:border-emerald-500 text-slate-100 text-xs rounded-xl p-3 focus:outline-none" required>
                            <button type="button" id="searchBtn" onclick="searchSongList()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 px-4 rounded-xl text-xs font-bold shrink-0 cursor-pointer"><i class="fa-solid fa-magnifying-glass"></i> ค้นหา</button>
                        </div>
                    </div>
                </div>

                <input type="hidden" id="selectedVideoUrl" value="">
                <div id="youtubeSongsList" class="hidden bg-slate-950 border border-slate-800 rounded-2xl max-h-60 overflow-y-auto divide-y divide-slate-900/60 shadow-inner"></div>
                <div id="statusAlert" class="hidden"></div>

                <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-slate-950 font-black text-sm py-3.5 px-4 rounded-xl shadow-lg flex items-center justify-center gap-2 cursor-pointer">
                    <i class="fa-solid fa-circle-plus"></i> ส่งคิวเพลงเข้าสู่ระบบ
                </button>
            </form>
        </div>

        <div class="space-y-3">
            <div class="flex items-center justify-between gap-4 border-b border-slate-800 pb-2">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-list-ol text-slate-400 text-sm"></i>
                    <h2 class="font-bold text-sm text-slate-300">ติดตามคิวเพลงของโต๊ะคุณ</h2>
                </div>
                <select id="customerTableFilter" onchange="handleCustomerFilterChange()" class="bg-slate-900 border border-slate-800 text-slate-300 text-xs rounded-xl px-3 py-1.5 cursor-pointer">
                    <option value="none">เลือกโต๊ะเพื่อกรองดูคิว</option>
                </select>
            </div>
            <div id="customerQueueList" class="grid grid-cols-1 md:grid-cols-2 gap-2.5"></div>
        </div>
    </main>

    <script type="module">
        // ... (โค้ด JavaScript เดิมของคุณ)
    </script>
</body>
</html>
