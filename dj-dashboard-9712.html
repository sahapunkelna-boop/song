<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แผงควบคุมดีเจ - DJ Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght=300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen antialiased">

    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-40 px-4 py-3">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-amber-500 rounded-2xl flex items-center justify-center text-slate-950 shadow-lg">
                    <i class="fa-solid fa-sliders text-xl"></i>
                </div>
                <div>
                    <h1 class="font-black text-sm md:text-base text-amber-400">DJ CONTROL CENTER</h1>
                    <p class="text-[10px] text-slate-400 tracking-wider font-mono">BACKEND REALTIME SYSTEM</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:py-8 space-y-6">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-5 shadow-xl">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1">เวลาเริ่มเปิดระบบรับเพลง</label>
                    <input type="time" id="configStartTime" onchange="updateSystemSettingsOnCloud()" class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-xs font-bold rounded-xl p-2.5 focus:outline-none">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1">เวลาสิ้นสุดระบบรับเพลง</label>
                    <input type="time" id="configEndTime" onchange="updateSystemSettingsOnCloud()" class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-xs font-bold rounded-xl p-2.5 focus:outline-none">
                </div>
                <div>
                    <button id="configToggleBtn" onclick="toggleSystemActiveOnCloud()" class="w-full font-black text-xs py-2.5 px-4 rounded-xl shadow-md text-center cursor-pointer"></button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-4">
                <div class="bg-slate-900 border border-slate-800 rounded-3xl p-4 shadow-xl flex flex-col gap-3">
                    <div class="flex items-center justify-between border-b border-slate-800 pb-2">
                        <h2 class="font-black text-sm text-white truncate">เครื่องเล่น: <span id="playingTitle" class="text-slate-400 font-medium">ยังไม่ได้เลือกเพลง</span></h2>
                        <button onclick="closeVideoPlayer()" class="text-xs bg-slate-800 text-rose-400 hover:bg-rose-600 hover:text-white border border-slate-700 px-3 py-1 rounded-xl transition-all cursor-pointer">ปิดเครื่องเล่น</button>
                    </div>
                    <div id="videoPlayerContainer" class="w-full aspect-video rounded-2xl overflow-hidden border border-slate-800 bg-black relative">
                        <div id="youtubePlayer" class="w-full h-full flex items-center justify-center text-slate-500 text-xs p-4 text-center">
                            <p id="playerStatusText">ระบบจะสตรีมเพลงแรกและคิวถัดไปให้คุณแบบอัตโนมัติ 🎧</p>
                        </div>
                    </div>
                    <div id="playerFallbackAlert" class="hidden p-3 bg-amber-950/40 border border-amber-500/20 text-amber-400 rounded-xl text-xs space-y-2">
                        <p class="font-semibold">⚠️ เพลงนี้ไม่อนุญาตให้เล่นแบบฝังในเว็บ (Embed Blocked)</p>
                        <a id="fallbackExternalLink" href="#" target="_blank" class="inline-block bg-amber-500 text-slate-950 font-bold px-3 py-1.5 rounded-lg text-xs">เปิดแท็บภายนอก</a>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1 bg-slate-900 border border-slate-800 rounded-3xl p-5 shadow-xl h-fit space-y-4">
                <div>
                    <label class="block text-[11px] font-black text-slate-400 tracking-wide mb-1.5">ตัวกรองแยกตามโต๊ะ</label>
                    <select id="adminTableFilter" onchange="handleTableFilterChange()" class="w-full bg-slate-950 border border-slate-800 text-slate-200 text-xs font-bold rounded-xl p-3 cursor-pointer">
                        <option value="all">แสดงคิวเพลงจาก "ทุกโต๊ะ"</option>
                    </select>
                </div>
                <button onclick="clearAllQueue()" class="w-full bg-rose-500/10 hover:bg-rose-600 border border-rose-500/20 text-rose-400 hover:text-white font-bold text-xs py-3 px-4 rounded-xl cursor-pointer transition-all">
                    💥 ล้างข้อมูลคิวเพลงทั้งหมดในระบบคลาวด์
                </button>
            </div>
        </div>

        <div class="space-y-4">
            <div class="grid grid-cols-3 gap-2 bg-slate-900 p-1.5 rounded-2xl border border-slate-800">
                <button id="tabBtn-pending" onclick="switchQueueTab('pending')" class="py-2 text-xs font-semibold rounded-lg text-amber-400 bg-slate-900 shadow border border-slate-800 flex flex-col items-center">
                    <span class="font-black text-sm" id="count-pending">0</span><span>📥 คิวรอเล่น</span>
                </button>
                <button id="tabBtn-playing" onclick="switchQueueTab('playing')" class="py-2 text-xs font-semibold rounded-lg text-slate-400 flex flex-col items-center">
                    <span class="font-black text-sm" id="count-playing">0</span><span>🔴 กำลังเล่น</span>
                </button>
                <button id="tabBtn-completed" onclick="switchQueueTab('completed')" class="py-2 text-xs font-semibold rounded-lg text-slate-400 flex flex-col items-center">
                    <span class="font-black text-sm" id="count-completed">0</span><span>✅ เล่นแล้ว</span>
                </button>
            </div>
            <div id="queueList" class="space-y-2.5 min-h-[200px]">
                <div id="emptyState" class="text-center py-12 text-slate-500 text-xs border border-dashed border-slate-800 rounded-2xl">ยังไม่มีคิวเพลง...</div>
            </div>
        </div>
    </main>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC9TWZbygXniEE2gE0SU08mFnaeCH2wlz8",
            authDomain: "my-shop-music.firebaseapp.com",
            databaseURL: "https://my-shop-music-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-shop-music",
            storageBucket: "my-shop-music.firebasestorage.app",
            messagingSenderId: "113291989652",
            appId: "1:113291989652:web:cc529e1558f661e29f5a81"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const songsRef = ref(db, 'songs');
        const systemSettingsRef = ref(db, 'system_settings');

        let currentTab = 'pending'; let selectedTableFilter = 'all'; let songQueue = []; let player = null; let isPlayerReady = false;
        let cloudSystemSettings = { isActive: true, startTime: "17:00", endTime: "00:00" };

        const adminFilterSelect = document.getElementById('adminTableFilter');
        for (let i = 1; i <= 30; i++) {
            let optAdmin = document.createElement('option');
            optAdmin.value = i; optAdmin.innerHTML = `แสดงเฉพาะคิว "โต๊ะที่ ${i}"`;
            adminFilterSelect.appendChild(optAdmin);
        }

        onValue(systemSettingsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                cloudSystemSettings = data;
                document.getElementById('configStartTime').value = data.startTime || "17:00";
                document.getElementById('configEndTime').value = data.endTime || "00:00";
                const toggleBtn = document.getElementById('configToggleBtn');
                if(data.isActive) {
                    toggleBtn.className = "w-full bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 text-xs py-2.5 rounded-xl cursor-pointer";
                    toggleBtn.innerHTML = `🟢 ระบบออนไลน์อยู่ (กดเพื่อปิด)`;
                } else {
                    toggleBtn.className = "w-full bg-rose-500/20 text-rose-400 border border-rose-500/30 text-xs py-2.5 rounded-xl cursor-pointer";
                    toggleBtn.innerHTML = `🔴 ระบบออฟไลน์อยู่ (กดเพื่อเปิด)`;
                }
            }
        });

        window.updateSystemSettingsOnCloud = function() {
            update(systemSettingsRef, { startTime: document.getElementById('configStartTime').value, endTime: document.getElementById('configEndTime').value });
        }
        window.toggleSystemActiveOnCloud = function() {
            update(systemSettingsRef, { isActive: !cloudSystemSettings.isActive });
        }

        onValue(songsRef, (snapshot) => {
            const data = snapshot.val(); songQueue = [];
            if (data) {
                Object.keys(data).forEach(key => { songQueue.push({ id: key, ...data[key] }); });
                songQueue.sort((a, b) => (a.order || 0) - (b.order || 0));
            }
            const activeSong = songQueue.find(item => item.status === 'playing');
            document.getElementById('playingTitle').innerText = activeSong ? activeSong.song : "ยังไม่ได้เลือกเพลง";
            renderQueue();
            if (isPlayerReady && !activeSong) playNextSong();
        });

        window.switchQueueTab = function(tabName) {
            currentTab = tabName;
            ['pending', 'playing', 'completed'].forEach(t => {
                const btn = document.getElementById(`tabBtn-${t}`);
                btn.className = t === tabName ? `py-2 text-xs font-semibold rounded-lg border border-slate-800 bg-slate-900 ${t==='pending'?'text-amber-400':t==='playing'?'text-rose-400':'text-emerald-400'}` : "py-2 text-xs font-semibold rounded-lg text-slate-400";
            });
            renderQueue();
        }

        window.handleTableFilterChange = function() { selectedTableFilter = adminFilterSelect.value; renderQueue(); }

        function renderQueue() {
            const queueList = document.getElementById('queueList');
            const emptyState = document.getElementById('emptyState');
            let filteredSongs = songQueue.filter(item => item.status === currentTab);
            if (selectedTableFilter !== 'all') filteredSongs = filteredSongs.filter(item => String(item.table) === String(selectedTableFilter));

            document.getElementById('count-pending').innerText = songQueue.filter(s => s.status === 'pending').length;
            document.getElementById('count-playing').innerText = songQueue.filter(s => s.status === 'playing').length;
            document.getElementById('count-completed').innerText = songQueue.filter(s => s.status === 'completed').length;

            queueList.querySelectorAll('.queue-item').forEach(item => item.remove());
            if (filteredSongs.length === 0) return emptyState.classList.remove('hidden');
            emptyState.classList.add('hidden');

            filteredSongs.forEach((item) => {
                const trueIndex = songQueue.findIndex(s => s.id === item.id);
                const itemDiv = document.createElement('div');
                itemDiv.className = "queue-item bg-slate-900 p-3 rounded-xl border border-slate-800 flex flex-col gap-2";
                const ytId = extractYouTubeId(item.url);
                
                let actions = '';
                if(currentTab === 'pending') {
                    actions = `<button onclick="initAndPlayPlayer('${ytId}', '${item.id}')" class="bg-rose-600 text-white text-xs px-3 py-1.5 rounded-lg flex-1">▶️ บังคับเล่น</button>
                               <button onclick="moveToStatus('${item.id}', 'completed')" class="bg-slate-800 text-xs px-3 py-1.5 rounded-lg">ข้ามไปจบ</button>`;
                } else if(currentTab === 'playing') {
                    actions = `<div class="text-xs text-rose-400 flex-1">⚡ กำลังเล่นอัตโนมัติ...</div>
                               <button onclick="moveToStatus('${item.id}', 'completed')" class="bg-emerald-600 text-white text-xs px-4 py-1.5 rounded-lg">จบเพลงนี้</button>`;
                } else {
                    actions = `<button onclick="moveToStatus('${item.id}', 'pending')" class="bg-slate-800 text-xs px-3 py-1.5 rounded-lg flex-1">ดึงกลับคิวรอ</button>`;
                }

                itemDiv.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div><span class="font-black text-amber-400">[โต๊ะ ${item.table}]</span> <span class="text-xs">${item.song}</span></div>
                        <button onclick="removeQueuePermanently('${item.id}')" class="text-rose-500 text-xs p-1"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    <div class="flex gap-2 border-t border-slate-800 pt-2 items-center">
                        ${actions}
                        <a href="${item.url}" target="_blank" class="bg-slate-800 p-1.5 rounded text-xs"><i class="fa-solid fa-external-link"></i></a>
                    </div>`;
                queueList.appendChild(itemDiv);
            });
        }

        window.moveToStatus = function(id, newStatus) {
            const updates = {}; updates[`/songs/${id}/status`] = newStatus;
            if (newStatus === 'playing') {
                songQueue.forEach(item => { if (item.status === 'playing' && item.id !== id) updates[`/songs/${item.id}/status`] = 'completed'; });
            }
            update(ref(db), updates);
        }

        function playNextSong() {
            const nextSong = songQueue.find(item => item.status === 'pending');
            if (nextSong) {
                const ytId = extractYouTubeId(nextSong.url);
                if (ytId) initAndPlayPlayer(ytId, nextSong.id); else window.moveToStatus(nextSong.id, 'completed');
            } else {
                document.getElementById('youtubePlayer').innerHTML = `<p class="p-4">คิวเพลงหมดแล้ว รอคิวใหม่จากลูกค้า...</p>`;
                player = null;
            }
        }

        window.initAndPlayPlayer = function(videoId, queueId) {
            if (!isPlayerReady) return;
            window.moveToStatus(queueId, 'playing');
            document.getElementById('playerFallbackAlert').classList.add('hidden');
            const target = document.getElementById('youtubePlayer');
            target.innerHTML = "<div id='youtubePlayerObject'></div>";

            player = new YT.Player('youtubePlayerObject', {
                height: '100%', width: '100%', videoId: videoId, playerVars: { 'autoplay': 1, 'playsinline': 1 },
                events: {
                    'onError': () => { document.getElementById('playerFallbackAlert').classList.remove('hidden'); document.getElementById('fallbackExternalLink').href = `https://www.youtube.com/watch?v=${videoId}`; },
                    'onStateChange': (e) => { if (e.data === YT.PlayerState.ENDED) { window.moveToStatus(queueId, 'completed'); setTimeout(playNextSong, 1000); } }
                }
            });
        }

        window.onYouTubeIframeAPIReady = function() { isPlayerReady = true; const playingSong = songQueue.find(item => item.status === 'playing'); if (!playingSong) playNextSong(); }
        window.closeVideoPlayer = function() { if (player && typeof player.stopVideo === 'function') player.stopVideo(); const active = songQueue.find(s => s.status === 'playing'); if (active) window.moveToStatus(active.id, 'completed'); }
        window.removeQueuePermanently = function(id) { if (confirm('ลบคิวนี้?')) remove(ref(db, `songs/${id}`)); }
        window.clearAllQueue = function() { if(confirm('ล้างคิวทั้งหมด?')) set(songsRef, null).then(closeVideoPlayer); }
        function extractYouTubeId(url) { const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/; const match = url.match(regExp); return (match && match[2].length === 11) ? match[2] : null; }
    </script>
</body>
</html>
